name: Weekly health check

on:
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Report repo health
        run: |
          echo "=== Workflow repo health ==="
          echo "Date: $(date -I)"
          echo "Branch: $(git branch --show-current)"
          echo "Latest commit: $(git log -1 --oneline)"
          echo "Commits last 7 days: $(git log --since='7 days ago' --oneline | wc -l)"
          echo "Total agent files: $(ls .claude/agents/*.md 2>/dev/null | wc -l)"
          echo "Total skill files: $(find .claude/skills -name 'SKILL.md' | wc -l)"
          echo "Total command files: $(ls .claude/commands/*.md 2>/dev/null | wc -l)"

      - name: Check agent frontmatter
        run: |
          echo "=== Agent frontmatter check ==="
          all_ok=true
          for f in .claude/agents/*.md; do
            [ -e "$f" ] || continue   # empty/absent agents dir (agent layer retired) — nothing to check, clean pass
            first_line=$(head -1 "$f")
            if [ "$first_line" != "---" ]; then
              echo "FAIL: $f — first line is not ---"
              all_ok=false
            else
              echo "OK: $(basename $f)"
            fi
          done
          if [ "$all_ok" = false ]; then
            exit 1
          fi

      - name: Check scope boundaries present
        run: |
          echo "=== Scope boundaries check ==="
          missing=0
          for f in .claude/agents/*.md; do
            [ -e "$f" ] || continue   # empty/absent agents dir — nothing to check
            if ! grep -q "SCOPE BOUNDARIES" "$f"; then
              echo "MISSING: $(basename $f)"
              missing=$((missing + 1))
            else
              echo "OK: $(basename $f)"
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "ERROR: $missing agents missing SCOPE BOUNDARIES"
            exit 1
          fi

      - name: Check no hardcoded Windows paths
        run: |
          echo "=== Windows path check ==="
          found=$(grep -rl "C:\\\\Users" .claude/ 2>/dev/null | wc -l)
          if [ "$found" -gt 0 ]; then
            echo "ERROR: Found $found files with hardcoded Windows paths:"
            grep -rl "C:\\\\Users" .claude/
            exit 1
          else
            echo "OK: No hardcoded Windows paths found"
          fi

      - name: Check engineering-standards rule-title parity (SKILL vs doc)
        run: |
          echo "=== engineering-standards SSOT title check ==="
          skill=.claude/skills/engineering-standards/SKILL.md
          doc=docs/standards/engineering-standards.md
          if [ ! -f "$skill" ] || [ ! -f "$doc" ]; then
            echo "ERROR: a standards file is missing ($skill / $doc)"; exit 1
          fi
          # Rule TITLES only — tolerates the intentional wording/format/wrapper drift
          # between the two consumers, but catches a rule added/renamed/dropped in one copy.
          # SKILL "N. **Title** — ..."  /  doc "### N. Title"; strip a trailing period.
          sed -nE 's/^[0-9]+\. \*\*([^*]+)\*\*.*/\1/p' "$skill" | sed -E 's/[. ]+$//' | sort > /tmp/skill_titles
          sed -nE 's/^### [0-9]+\. (.+)$/\1/p'        "$doc"   | sed -E 's/[. ]+$//' | sort > /tmp/doc_titles
          if diff -u /tmp/skill_titles /tmp/doc_titles; then
            echo "OK: $(wc -l < /tmp/skill_titles) rule titles match between SKILL and doc"
          else
            echo "ERROR: engineering-standards rule TITLES diverge between the two copies (see diff above)."
            echo "Wording/format may differ by consumer (allowed); the rule SET must not. Sync the drifted title."
            exit 1
          fi
