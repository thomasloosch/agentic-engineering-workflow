name: Secret scan

# Secret-scan only — no dependency audit (this repo has no package.json; the only
# dependency surface, the Actions versions, is dependabot's). gitleaks-action@v2 is
# free for personal repos, so no GITLEAKS_LICENSE secret is required.
#
# Modes (the action auto-selects by event):
#   - push / pull_request -> incremental: scans the commits in the change.
#   - workflow_dispatch    -> full history: the deliberate baseline scan.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so a workflow_dispatch baseline scans every commit, not just
          # the latest push — secrets deleted from HEAD still live in history.
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        # Blocking: a finding fails the run. Baseline (full-history workflow_dispatch)
        # came back clean, so there are no false-positives to allowlist.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks auto-loads ./.gitleaks.toml (default rules via [extend] + our allowlist).
